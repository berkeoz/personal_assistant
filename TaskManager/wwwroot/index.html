<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Task Manager</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --accent: #6c8eff;
    --accent2: #a78bfa;
    --green: #34d399;
    --red: #f87171;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --radius: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px 12px;
    gap: 4px;
  }
  .sidebar h1 {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 16px;
    padding-left: 8px;
    letter-spacing: 0.5px;
  }
  .nav-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 9px 12px;
    border-radius: var(--radius);
    text-align: left;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s, color 0.15s;
  }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active { background: var(--surface2); color: var(--accent); font-weight: 600; }
  .nav-btn .icon { font-size: 16px; width: 20px; text-align: center; }

  /* ── Stats strip in sidebar ── */
  .stats-strip {
    margin-top: auto;
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .stat { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); }
  .stat span { color: var(--text); font-weight: 600; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width 0.4s ease; }

  /* ── Main ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .topbar {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
  }
  .topbar h2 { font-size: 16px; font-weight: 600; flex: 1; }
  .btn {
    border: none;
    cursor: pointer;
    padding: 7px 14px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-success { background: var(--green); color: #0f1117; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

  .view { flex: 1; overflow: auto; padding: 24px; display: none; }
  .view.active { display: flex; flex-direction: column; gap: 16px; }

  /* ── Task list view ── */
  .add-row { display: flex; gap: 8px; }
  .add-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .add-row input:focus { border-color: var(--accent); }

  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-chip {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
  }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .task-list { display: flex; flex-direction: column; gap: 6px; }

  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 11px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: border-color 0.15s;
  }
  .task-item:hover { border-color: var(--accent); }
  .task-item.done { opacity: 0.5; }
  .task-item.done .task-text { text-decoration: line-through; }

  .task-cb { width: 17px; height: 17px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
  .task-text { flex: 1; font-size: 13px; }
  .task-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
    background: var(--surface2);
    color: var(--accent2);
  }
  .task-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0 2px;
    transition: color 0.15s;
  }
  .task-del:hover { color: var(--red); }

  /* ── Editor view ── */
  .editor-wrap { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  #md-editor {
    flex: 1;
    min-height: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    color: var(--text);
    font-family: 'Cascadia Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.7;
    resize: none;
    outline: none;
    transition: border-color 0.15s;
  }
  #md-editor:focus { border-color: var(--accent); }
  .editor-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .save-status { font-size: 12px; color: var(--muted); align-self: center; margin-right: auto; }
  .save-status.saved { color: var(--green); }

  /* ── Summary view ── */
  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
  }
  .summary-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .summary-card .value { font-size: 28px; font-weight: 700; }
  .summary-card.green .value { color: var(--green); }
  .summary-card.blue .value { color: var(--accent); }
  .summary-card.purple .value { color: var(--accent2); }

  .pending-list { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .pending-list h3 { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .pending-item { padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .pending-item:last-child { border-bottom: none; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

  .empty { color: var(--muted); text-align: center; padding: 40px; }

  /* toast */
  #toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 18px; border-radius: 8px;
    font-size: 13px; opacity: 0; transition: opacity 0.25s;
    pointer-events: none; z-index: 999;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<nav class="sidebar">
  <h1>⚡ Tasks</h1>
  <button class="nav-btn active" data-view="list" onclick="switchView('list', this)">
    <span class="icon">✅</span> Task List
  </button>
  <button class="nav-btn" data-view="editor" onclick="switchView('editor', this)">
    <span class="icon">📝</span> Markdown Editor
  </button>
  <button class="nav-btn" data-view="summary" onclick="switchView('summary', this)">
    <span class="icon">📊</span> Summary
  </button>

  <div class="stats-strip" id="sidebar-stats">
    <div class="stat">Total <span id="s-total">–</span></div>
    <div class="stat">Done <span id="s-done">–</span></div>
    <div class="progress-bar"><div class="progress-fill" id="s-bar" style="width:0%"></div></div>
  </div>
</nav>

<div class="main">

  <!-- Task List -->
  <div class="view active" id="view-list">
    <div class="add-row">
      <input id="new-task-input" type="text" placeholder="Add a task… (Enter to add)" />
      <button class="btn btn-primary" onclick="addTask()">+ Add</button>
    </div>
    <div class="filter-row">
      <button class="filter-chip active" onclick="setFilter('all', this)">All</button>
      <button class="filter-chip" onclick="setFilter('pending', this)">Pending</button>
      <button class="filter-chip" onclick="setFilter('done', this)">Done</button>
    </div>
    <div class="task-list" id="task-list"></div>
  </div>

  <!-- Editor -->
  <div class="view" id="view-editor">
    <div class="editor-wrap">
      <textarea id="md-editor" spellcheck="false" placeholder="Loading…"></textarea>
      <div class="editor-actions">
        <span class="save-status" id="save-status">unsaved changes</span>
        <button class="btn btn-ghost" onclick="loadMarkdown()">↺ Reload</button>
        <button class="btn btn-success" onclick="saveMarkdown()">💾 Save</button>
      </div>
    </div>
  </div>

  <!-- Summary -->
  <div class="view" id="view-summary">
    <div class="summary-grid">
      <div class="summary-card blue"><div class="label">Total</div><div class="value" id="sum-total">–</div></div>
      <div class="summary-card green"><div class="label">Completed</div><div class="value" id="sum-done">–</div></div>
      <div class="summary-card purple"><div class="label">Pending</div><div class="value" id="sum-pending">–</div></div>
    </div>
    <div class="pending-list">
      <h3>Pending tasks</h3>
      <div id="sum-list"></div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
const API = 'http://localhost:5199/api';
let rawMd = '';
let filter = 'all';
let dirty = false;

// ── Utils ──────────────────────────────────────────────
function toast(msg, dur = 2000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

function switchView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'list') renderList();
  if (name === 'editor') loadMarkdown();
  if (name === 'summary') loadSummary();
}

// ── Markdown helpers ───────────────────────────────────
function parseTasks(md) {
  return md.split('\n').map((line, i) => {
    const t = line.trim();
    if (!t.startsWith('- [')) return null;
    const done = t[3] !== ' ';
    const text = t.slice(5).trim();
    // extract #tag
    const tagMatch = text.match(/#(\w+)/);
    const tag = tagMatch ? tagMatch[1] : null;
    const cleanText = text.replace(/#\w+/g, '').trim();
    return { lineIndex: i, done, text: cleanText, tag };
  }).filter(Boolean);
}

function toggleInMd(lineIndex) {
  const lines = rawMd.split('\n');
  const line = lines[lineIndex];
  if (line.includes('- [ ]')) lines[lineIndex] = line.replace('- [ ]', '- [x]');
  else lines[lineIndex] = line.replace(/- \[[xX]\]/, '- [ ]');
  rawMd = lines.join('\n');
  return saveSilent();
}

function deleteInMd(lineIndex) {
  const lines = rawMd.split('\n');
  lines.splice(lineIndex, 1);
  rawMd = lines.join('\n');
  return saveSilent();
}

function appendTask(text) {
  if (!rawMd.endsWith('\n')) rawMd += '\n';
  rawMd += `- [ ] ${text}\n`;
  return saveSilent();
}

async function saveSilent() {
  await fetch(`${API}/tasks`, { method: 'POST', body: rawMd, headers: { 'Content-Type': 'text/plain' } });
  updateSidebarStats();
}

// ── Load / Render ──────────────────────────────────────
async function loadRaw() {
  const r = await fetch(`${API}/tasks`);
  rawMd = await r.text();
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const tasks = parseTasks(rawMd);
  const filtered = tasks.filter(t => filter === 'all' || (filter === 'done' ? t.done : !t.done));
  const el = document.getElementById('task-list');
  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty">No tasks here yet.</div>`;
    return;
  }
  el.innerHTML = filtered.map(t => `
    <div class="task-item ${t.done ? 'done' : ''}">
      <input class="task-cb" type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.lineIndex})" />
      <span class="task-text">${escHtml(t.text)}</span>
      ${t.tag ? `<span class="task-tag">#${t.tag}</span>` : ''}
      <button class="task-del" onclick="deleteTask(${t.lineIndex})" title="Delete">×</button>
    </div>
  `).join('');
}

async function toggle(lineIndex) {
  await toggleInMd(lineIndex);
  await loadRaw();
  renderList();
}

async function deleteTask(lineIndex) {
  await deleteInMd(lineIndex);
  await loadRaw();
  renderList();
}

async function addTask() {
  const input = document.getElementById('new-task-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  await appendTask(text);
  await loadRaw();
  renderList();
  toast('Task added');
}

document.getElementById('new-task-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Editor ─────────────────────────────────────────────
async function loadMarkdown() {
  await loadRaw();
  document.getElementById('md-editor').value = rawMd;
  setSaveStatus(false);
}

function setSaveStatus(isDirty) {
  dirty = isDirty;
  const el = document.getElementById('save-status');
  if (isDirty) { el.textContent = 'unsaved changes'; el.classList.remove('saved'); }
  else { el.textContent = 'saved'; el.classList.add('saved'); }
}

document.getElementById('md-editor').addEventListener('input', () => setSaveStatus(true));

async function saveMarkdown() {
  rawMd = document.getElementById('md-editor').value;
  await fetch(`${API}/tasks`, { method: 'POST', body: rawMd, headers: { 'Content-Type': 'text/plain' } });
  setSaveStatus(false);
  updateSidebarStats();
  toast('Saved ✓');
}

// ── Summary ────────────────────────────────────────────
async function loadSummary() {
  const r = await fetch(`${API}/summary`);
  const data = await r.json();
  document.getElementById('sum-total').textContent = data.total;
  document.getElementById('sum-done').textContent = data.completed;
  document.getElementById('sum-pending').textContent = data.pending;
  const list = document.getElementById('sum-list');
  const pending = data.tasks.filter(t => !t.done);
  if (pending.length === 0) {
    list.innerHTML = '<div class="empty">All done! 🎉</div>';
    return;
  }
  list.innerHTML = pending.map(t => `
    <div class="pending-item"><span class="dot"></span>${escHtml(t.text)}</div>
  `).join('');
}

// ── Sidebar stats ──────────────────────────────────────
async function updateSidebarStats() {
  const r = await fetch(`${API}/summary`);
  const data = await r.json();
  document.getElementById('s-total').textContent = data.total;
  document.getElementById('s-done').textContent = data.completed;
  const pct = data.total ? Math.round((data.completed / data.total) * 100) : 0;
  document.getElementById('s-bar').style.width = pct + '%';
}

// ── Boot ───────────────────────────────────────────────
(async () => {
  await loadRaw();
  renderList();
  updateSidebarStats();
})();
</script>
</body>
</html>
